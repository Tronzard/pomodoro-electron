<!doctype html>
<html>
  <head>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        display: inline-block;
        font-family: Georgia, serif, "Inter";
      }

      body {
        -webkit-app-region: drag;
      }

      @font-face {
        font-family: Inter; 
        src: url("./font/Inter-VariableFont_opsz\,wght.ttf") format("truetype");
      }

      .widget {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .tomato {
        font-size: 80px;
      }

      /* todo add border to white text */
      .timer {
        font-size: 20px;
        color: white;
        margin-bottom: 8px;
        margin-top: -12px;
        font-family: Inter;
        font-weight: 500;
      }

      /* From Uiverse.io by byllzz */
      .glass-card {
        display: flex;
        flex-direction: column;
        width: 160px;
        background: rgba(36, 36, 36, 0.628);

        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 14px;
        padding: 14px;
        color: #ffffff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: transform 0.3s ease;
        overflow: visible;
        gap: 14px;
      }

      .glass-card, button {
        -webkit-app-region: no-drag;
      }

      .counter{
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        font-family: Inter;
        font-weight: 100;
      }

      .counter label{
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .increment-btn{
        border: none;
        background: none;

        display: flex;
        align-items: center;
        justify-content: center;

        height: 100%;
        padding: 0;

        color: white;
        font-size: 18px;
        cursor: pointer;
        font-family: Inter;

      }

      .title {
        text-align: center;
        font-family: Inter;
        font-size: 15px;
        font-weight: 600;
        color: #e86b62;
        text-decoration: underline;
        text-underline-offset: 6px;
      }

      .counter {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;

      }

      .increment-btn {
        width: 28px;
        height: 28px;

        border: none;
        border-radius: 8px;

        background: transparent;

        color: white;

        font-family: Inter;
        font-size: 18px;
        font-weight: 500;

        cursor: pointer;

        transition: 0.15s;
      }

      .increment-btn:hover {
        background: rgba(255,255,255,0.08);
      }

      .start-btn {
        flex: 1;

        height: 30px;
        padding: 0 14px;

        border-radius: 10px;
        border: none;

        background: #ef554b;
        color: white;

        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;

        font-size: 13px;
        font-weight: 600;

        cursor: pointer;

        transition: transform 0.18s ease,
                    box-shadow 0.18s ease,
                    filter 0.18s ease;
        
        will-change: transform;
      }

      .start-btn:hover {
          transform: scale(1.06);

          box-shadow:
            0 12px 30px rgba(239, 85, 75, 0.35),
            0 6px 14px rgba(0, 0, 0, 0.25);
        }

      .duration {
        font-size: 15px;
        font-weight: 400;
        color: rgba(255,255,255,0.9);
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .start-btn {
        flex: 0 0 auto;
        width: clamp(90px, 40%, 160px);

        height: 32px;
        border-radius: 10px;
        border: none;

        background: #ea645a;
        color: white;

        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;

        font-family: Inter;

        font-size: 13px;
        font-weight: 400;

        cursor: pointer;

        transform-origin: center center;

        transition: transform 0.18s ease, 
              filter 0.18s ease,
              box-shadow 0.18s ease;
      }

      .start-btn .icon {
        font-size: 12px;
        margin-top: 1px;
     }

      .reset-btn {
        width: 34px;
        height: 34px;

        border-radius: 10px;
        border: none;

        background: rgba(255,255,255,0.06);
        color: white;

        font-size: 20px;

        display: flex;
        align-items: center;
        justify-content: center;

        cursor: pointer;
        transition: 0.15s;
        margin-right: 16px;

      }

      .reset-btn:hover {
        background: rgba(255,255,255,0.12);
      }

      .start-btn:active {
        transform: scale(0.98);
        filter: brightness(0.95);

        box-shadow:
          0 6px 14px rgba(239, 85, 75, 0.2);
      }

    </style>
  </head>

      </div>
      <div class="timer" id="timer">25:00</div>


      <div class="glass-card">
        <div class="title">Focus</div>

        <div class="counter">
          <button class="increment-btn">−</button>

          <span class="duration">25 min</span>

          <button class="increment-btn">+</button>
        </div>

        <div class="counter">
          <button class="increment-btn">−</button>

          <span class="duration">25 min</span>

          <button class="increment-btn">+</button>

        <div class="actions">
          <button class="start-btn">

        </div>

        </div>

        </div>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
